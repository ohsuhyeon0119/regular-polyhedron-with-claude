<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Platonic Solids</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="sidebar">
      <div class="sidebar-title">PLATONIC SOLIDS</div>
    </div>
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="drag-hint">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="7" cy="7" r="6" stroke="currentColor" stroke-width="1"/>
          <path d="M7 2.5v2M7 9.5v2M2.5 7h2M9.5 7h2" stroke="currentColor" stroke-width="1" stroke-linecap="round"/>
        </svg>
        드래그하여 회전
      </div>
      <div id="info-panel">
        <div id="info-left">
          <div id="info-name"></div>
          <div id="info-sub"></div>
        </div>
        <div id="info-stats">
          <div class="stat">
            <div class="stat-value" id="stat-faces"></div>
            <div class="stat-label">Faces</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="stat-edges"></div>
            <div class="stat-label">Edges</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="stat-verts"></div>
            <div class="stat-label">Vertices</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
